<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiana 3D Avatar View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent !important;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent !important;
        }
    </style>
    <!-- All JS files use absolute /static/ paths — no import map needed -->


</head>
<body>
    <div id="canvas-container">
        <canvas id="vrm-canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from '/static/js/libs/three.module.js';
        import { GLTFLoader } from '/static/js/libs/GLTFLoader.js';
        import { VRMLoaderPlugin } from '/static/js/libs/three-vrm.module.js';

        let currentVrm = null;
        let clock = new THREE.Clock();
        let scene, camera, renderer;
        let isSpeaking = false;
        let currentEmotion = "Relaxed";

        // Expose control functions to Python/window context
        window.startMouthSync = function() {
            isSpeaking = true;
        };

        window.stopMouthSync = function() {
            isSpeaking = false;
        };

        window.setAvatarEmotion = function(emotion) {
            currentEmotion = emotion;
            applyExpression(emotion);
        };

        function init() {
            const canvas = document.getElementById("vrm-canvas");
            const container = document.getElementById("canvas-container");
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 20.0);
            camera.position.set(0.0, 1.45, 0.95); // Focused tightly on face
            camera.lookAt(0.0, 1.45, 0.0);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(directionalLight);

            loadVRM("/static/assets/kiana.vrm");
            animate();
        }

        function loadVRM(url) {
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(
                url,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;

                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => {
                        obj.frustumCulled = false;
                    });
                    
                    applyExpression(currentEmotion);
                },
                null,
                (error) => {
                    const defaultUrl = "https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/VRM1_Self_introduction_1_1.vrm";
                    if (url !== defaultUrl) {
                        loadVRM(defaultUrl);
                    }
                }
            );
        }

        function applyExpression(emotion) {
            currentEmotion = emotion;
            if (!currentVrm) return;
            const manager = currentVrm.expressionManager;
            ['happy','angry','sad','relaxed','surprised','neutral'].forEach(k => {
                try { manager.setValue(k, 0); } catch(e) {}
            });

            if (emotion === 'Happy') {
                manager.setValue('happy', 1.0);
            } else if (emotion === 'Excited') {
                manager.setValue('happy', 0.7);
                manager.setValue('surprised', 0.4);
            } else if (emotion === 'Concerned') {
                manager.setValue('sad', 0.8);
            } else if (emotion === 'Curious') {
                manager.setValue('surprised', 0.7);
            } else if (emotion === 'Sleepy') {
                manager.setValue('relaxed', 0.5);
                manager.setValue('blink', 0.4);
            } else if (emotion === 'Surprised') {
                manager.setValue('surprised', 1.0);
            } else if (emotion === 'Embarrassed') {
                manager.setValue('happy', 0.3);
                manager.setValue('relaxed', 0.3);
            } else if (emotion === 'Proud') {
                manager.setValue('happy', 0.7);
                manager.setValue('relaxed', 0.3);
            } else if (emotion === 'Thinking') {
                if (currentVrm.humanoid) {
                    const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
                    if (neck) neck.rotation.z = -0.1;
                }
            } else {
                manager.setValue('relaxed', 1.0);
            }
        }

        // Exposed to Python: programmatically start mic recording
        window.startMicRecording = function() {
            if (typeof toggleRecording === 'function') {
                toggleRecording();
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                const time = clock.getElapsedTime();

                // Breathing
                const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
                if (spine) {
                    spine.rotation.z = Math.sin(time * 2.0) * 0.012;
                    spine.rotation.x = Math.sin(time * 1.5) * 0.008;
                }

                // Eyelid Blinking
                const blinkFactor = Math.sin(time * 0.5) > 0.985 ? 1.0 : 0.0;
                if (blinkFactor > 0) {
                    currentVrm.expressionManager.setValue('blink', blinkFactor);
                } else {
                    if (currentEmotion === "Sleepy") {
                        currentVrm.expressionManager.setValue('blink', 0.3);
                    } else {
                        currentVrm.expressionManager.setValue('blink', 0.0);
                    }
                }

                // Talking Lip sync
                if (isSpeaking) {
                    const mouthOpen = 0.2 + Math.abs(Math.sin(time * 18.0)) * 0.8;
                    currentVrm.expressionManager.setValue('aa', mouthOpen);
                } else {
                    currentVrm.expressionManager.setValue('aa', 0.0);
                }

                currentVrm.update(delta);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
