<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiana 3D Desktop Mascot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
            user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent !important;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent !important;
        }

        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            top: 15px;
            left: 8%;
            right: 8%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f1f5f9;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            line-height: 1.4;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }
        .speech-bubble.active {
            opacity: 1;
            transform: translateY(0);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: rgba(15, 23, 42, 0.85) transparent;
            display: block;
            width: 0;
        }

        /* Bottom Chat/Voice Input Bar */
        .input-bar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 3px 6px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 101;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }
        .input-bar.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .input-bar textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            padding: 6px 8px;
            resize: none;
            height: 30px;
            line-height: 18px;
        }
        .input-bar button {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background-color 0.2s;
        }
        .input-bar button:hover {
            color: #f8fafc;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .input-bar button.recording {
            color: #f43f5e;
            animation: pulse-mic 1.5s infinite;
        }
        
        @keyframes pulse-mic {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); background-color: rgba(244, 63, 94, 0.1); }
            100% { transform: scale(1); }
        }

        /* Tiny status indicator */
        .mascot-status {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(15, 23, 42, 0.82);
            padding: 3px 10px;
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 99;
            white-space: nowrap;
        }
        .mascot-status.active {
            opacity: 1;
        }

        /* ── Always-visible floating mic button ── */
        .float-mic {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(14, 165, 233, 0.18);
            border: 1.5px solid rgba(14, 165, 233, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            box-shadow: 0 2px 14px rgba(0,0,0,0.25);
        }
        .float-mic:hover {
            background: rgba(14, 165, 233, 0.32);
            transform: translateX(-50%) scale(1.06);
        }
        .float-mic svg {
            color: #e0f2fe;
            transition: color 0.2s;
        }
        .float-mic.recording {
            background: rgba(244, 63, 94, 0.25);
            border-color: rgba(244, 63, 94, 0.7);
        }
        .float-mic.recording svg { color: #fda4af; }
        .float-mic.thinking {
            background: rgba(168, 85, 247, 0.22);
            border-color: rgba(168, 85, 247, 0.6);
            animation: none;
        }
        /* Pulsing ring when recording */
        .float-mic.recording::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(244, 63, 94, 0.5);
            animation: mic-ring 1.1s ease-out infinite;
        }
        @keyframes mic-ring {
            0%   { transform: scale(1);   opacity: 1; }
            100% { transform: scale(1.55); opacity: 0; }
        }
        /* Dots animation for thinking */
        .thinking-dots::after {
            content: '';
            animation: dots 1.2s steps(3, end) infinite;
        }
        @keyframes dots {
            0%   { content: '.'; }
            33%  { content: '..'; }
            66%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
    <!-- All JS files use absolute /static/ paths — no import map needed -->


</head>
<body>
    <div id="canvas-container">
        <!-- Speech bubble above character -->
        <div id="speech-bubble" class="speech-bubble">Hi there!</div>
        
        <!-- WebGL Canvas for 3D model -->
        <canvas id="vrm-canvas"></canvas>
        
        <!-- Status text (above float mic) -->
        <div id="mascot-status" class="mascot-status">Listening...</div>

        <!-- Always-visible floating mic button (voice conversation) -->
        <div id="float-mic" class="float-mic" title="Tap to talk to Kiana">
            <svg id="float-mic-icon" viewBox="0 0 24 24" width="22" height="22">
                <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
        </div>

        <!-- Hidden text input bar (double-click to show) -->
        <div id="input-bar" class="input-bar">
            <button id="voice-btn" title="Speak (Microphone)">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
            <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn" title="Send text">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from '/static/js/libs/three.module.js';
        import { GLTFLoader } from '/static/js/libs/GLTFLoader.js';
        import { VRMLoaderPlugin } from '/static/js/libs/three-vrm.module.js';

        let currentVrm = null;
        let clock = new THREE.Clock();
        let scene, camera, renderer;
        let isSpeaking = false;
        let currentEmotion = "Relaxed";

        // DOM elements
        const bubble = document.getElementById("speech-bubble");
        const inputBar = document.getElementById("input-bar");
        const chatInput = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");
        const voiceBtn = document.getElementById("voice-btn");
        const statusText = document.getElementById("mascot-status");
        const floatMic = document.getElementById("float-mic");

        // Media recorder variables
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioPlayer = new Audio();
        let isAutoTTS = true;
        let bubbleTimeout = null;

        // ── Floating Mic – full voice conversation loop ────────────────────
        let floatRecording = false;
        let floatMediaRecorder = null;
        let floatChunks = [];
        let silenceTimer = null;
        let floatStream = null;

        // Mic icon SVGs
        const MIC_SVG = `<path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>`;
        const STOP_SVG = `<path fill="currentColor" d="M6 6h12v12H6z"/>`;

        function setFloatMicIcon(svg) {
            document.getElementById("float-mic-icon").innerHTML = svg;
        }

        function setFloatState(state) {
            floatMic.classList.remove('recording', 'thinking');
            if (state === 'recording') {
                floatMic.classList.add('recording');
                setFloatMicIcon(STOP_SVG);
                showStatus('🎤 Listening...', 0);
            } else if (state === 'thinking') {
                floatMic.classList.add('thinking');
                setFloatMicIcon(MIC_SVG);
                showStatus('💭 Thinking...', 0);
            } else {
                setFloatMicIcon(MIC_SVG);
                hideStatus();
            }
        }

        async function startFloatRecording() {
            if (floatRecording || isSpeaking) return;
            try {
                floatStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) {
                showStatus('❌ Mic access denied', 3000);
                return;
            }

            floatChunks = [];
            floatMediaRecorder = new MediaRecorder(floatStream);
            floatMediaRecorder.ondataavailable = e => {
                if (e.data && e.data.size > 0) floatChunks.push(e.data);
            };
            floatMediaRecorder.onstop = () => {
                floatStream.getTracks().forEach(t => t.stop());
                const blob = new Blob(floatChunks, { type: 'audio/webm' });
                sendFloatAudio(blob);
            };

            floatMediaRecorder.start(200); // collect chunks every 200ms
            floatRecording = true;
            setFloatState('recording');

            // Silence detection: if audio level stays low for 2s, auto-stop
            setupSilenceDetection(floatStream);
        }

        function stopFloatRecording() {
            if (!floatRecording) return;
            floatRecording = false;
            clearTimeout(silenceTimer);
            if (floatMediaRecorder && floatMediaRecorder.state !== 'inactive') {
                floatMediaRecorder.stop();
            }
            setFloatState('thinking');
        }

        function setupSilenceDetection(stream) {
            try {
                const ctx = new AudioContext();
                const src = ctx.createMediaStreamSource(stream);
                const analyser = ctx.createAnalyser();
                analyser.fftSize = 512;
                src.connect(analyser);
                const buf = new Uint8Array(analyser.fftSize);

                function checkSilence() {
                    if (!floatRecording) { ctx.close(); return; }
                    analyser.getByteTimeDomainData(buf);
                    const vol = buf.reduce((acc, v) => acc + Math.abs(v - 128), 0) / buf.length;
                    if (vol < 4) { // near silence threshold
                        if (!silenceTimer) {
                            silenceTimer = setTimeout(() => {
                                if (floatRecording) stopFloatRecording();
                            }, 1800); // 1.8s of silence → auto-send
                        }
                    } else {
                        clearTimeout(silenceTimer);
                        silenceTimer = null;
                    }
                    requestAnimationFrame(checkSilence);
                }
                checkSilence();
            } catch(e) {
                // Silence detection unavailable — manual stop only
            }
        }

        function sendFloatAudio(blob) {
            const formData = new FormData();
            formData.append('audio', blob, 'voice.webm');

            fetch('/api/voice-stt', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    const text = (data.text || '').trim();
                    if (!text || text.startsWith('[')) {
                        // Transcription empty or error — reset
                        setFloatState('idle');
                        showStatus('Didn\'t catch that, try again', 2500);
                        return;
                    }
                    // Show what was heard
                    showSpeechBubble('You: ' + text);
                    clearTimeout(bubbleTimeout);
                    // Send to chat
                    return fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                })
                .then(r => r && r.json())
                .then(data => {
                    if (!data) return;
                    setFloatState('idle');
                    applyExpression(data.emotion || 'Relaxed');
                    speakText(data.response || '');
                })
                .catch(err => {
                    console.error('Float voice error:', err);
                    setFloatState('idle');
                    showStatus('Error — try again', 3000);
                });
        }

        floatMic.addEventListener('click', () => {
            if (isSpeaking) {
                // Stop Kiana speaking
                audioPlayer.pause();
                audioPlayer.src = '';
                isSpeaking = false;
                hideSpeechBubble();
                return;
            }
            if (floatRecording) {
                stopFloatRecording();
            } else {
                startFloatRecording();
            }
        });
        // ── End floating mic ───────────────────────────────────────────────

        // Exposed to Python: programmatically start mic recording
        window.startMicRecording = function() {
            // Show input bar first
            if (!inputBar.classList.contains('active')) {
                inputBar.classList.add('active');
            }
            // Trigger microphone
            toggleRecording();
        };

        // Exposed functions to toggle input bar from python
        window.toggleInputBar = function() {
            const isActive = inputBar.classList.toggle("active");
            if (isActive) {
                chatInput.focus();
            } else {
                chatInput.blur();
            }
            return isActive;
        };

        function showStatus(text, duration = 3000) {
            statusText.textContent = text;
            statusText.classList.add("active");
            if (duration > 0) {
                setTimeout(() => statusText.classList.remove("active"), duration);
            }
        }

        function hideStatus() {
            statusText.classList.remove("active");
        }

        function showSpeechBubble(text) {
            bubble.textContent = text;
            bubble.classList.add("active");
            if (bubbleTimeout) clearTimeout(bubbleTimeout);
        }

        function hideSpeechBubble() {
            bubble.classList.remove("active");
        }

        // Initialize 3D Scene
        function init() {
            const canvas = document.getElementById("vrm-canvas");
            const container = document.getElementById("canvas-container");
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 20.0);
            camera.position.set(0.0, 1.45, 0.90); // Tight zoom on face
            camera.lookAt(0.0, 1.45, 0.0);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(directionalLight);

            loadVRM("/static/assets/kiana.vrm");
            animate();
        }

        function loadVRM(url) {
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(
                url,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    scene.add(vrm.scene);
                    currentVrm = vrm;

                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => {
                        obj.frustumCulled = false;
                    });
                    
                    applyExpression(currentEmotion);
                },
                null,
                (error) => {
                    const defaultUrl = "https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/VRM1_Self_introduction_1_1.vrm";
                    if (url !== defaultUrl) {
                        loadVRM(defaultUrl);
                    }
                }
            );
        }

        function applyExpression(emotion) {
            currentEmotion = emotion;
            if (!currentVrm) return;
            const manager = currentVrm.expressionManager;
            // Reset all
            ['happy','angry','sad','relaxed','surprised','neutral'].forEach(k => {
                try { manager.setValue(k, 0); } catch(e) {}
            });

            if (emotion === 'Happy') {
                manager.setValue('happy', 1.0);
            } else if (emotion === 'Excited') {
                manager.setValue('happy', 0.7);
                manager.setValue('surprised', 0.4);
            } else if (emotion === 'Concerned') {
                manager.setValue('sad', 0.8);
            } else if (emotion === 'Curious') {
                manager.setValue('surprised', 0.7);
            } else if (emotion === 'Sleepy') {
                manager.setValue('relaxed', 0.5);
                manager.setValue('blink', 0.4);
            } else if (emotion === 'Surprised') {
                manager.setValue('surprised', 1.0);
            } else if (emotion === 'Embarrassed') {
                manager.setValue('happy', 0.3);
                manager.setValue('relaxed', 0.3);
            } else if (emotion === 'Proud') {
                manager.setValue('happy', 0.7);
                manager.setValue('relaxed', 0.3);
            } else if (emotion === 'Thinking') {
                // Slight tilt + neutral
                if (currentVrm.humanoid) {
                    const neck = currentVrm.humanoid.getNormalizedBoneNode('neck');
                    if (neck) neck.rotation.z = -0.1;
                }
            } else {
                manager.setValue('relaxed', 1.0);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVrm) {
                const time = clock.getElapsedTime();

                // Breathing
                const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
                if (spine) {
                    spine.rotation.z = Math.sin(time * 2.0) * 0.012;
                    spine.rotation.x = Math.sin(time * 1.5) * 0.008;
                }

                // Eyelid Blinking
                const blinkFactor = Math.sin(time * 0.5) > 0.985 ? 1.0 : 0.0;
                if (blinkFactor > 0) {
                    currentVrm.expressionManager.setValue('blink', blinkFactor);
                } else {
                    if (currentEmotion === "Sleepy") {
                        currentVrm.expressionManager.setValue('blink', 0.3);
                    } else {
                        currentVrm.expressionManager.setValue('blink', 0.0);
                    }
                }

                // Talking Lip sync
                if (isSpeaking) {
                    const mouthOpen = 0.2 + Math.abs(Math.sin(time * 18.0)) * 0.8;
                    currentVrm.expressionManager.setValue('aa', mouthOpen);
                } else {
                    currentVrm.expressionManager.setValue('aa', 0.0);
                }

                currentVrm.update(delta);
            }

            renderer.render(scene, camera);
        }

        // Voice TTS Player
        function speakText(text) {
            isSpeaking = true;
            showSpeechBubble(text);
            showStatus('Speaking...', 0);

            fetch("/api/voice-tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            })
            .then(res => res.json())
            .then(data => {
                hideStatus();
                if (data.audio_url) {
                    // Cache-bust so Edge WebView2 doesn't serve stale audio
                    const url = data.audio_url + '?t=' + Date.now();
                    audioPlayer.pause();
                    audioPlayer.src = '';
                    audioPlayer.src = url;
                    audioPlayer.load();

                    audioPlayer.onended = () => {
                        isSpeaking = false;
                        bubbleTimeout = setTimeout(hideSpeechBubble, 4000);
                    };
                    audioPlayer.onerror = (e) => {
                        console.error("Audio error:", e);
                        isSpeaking = false;
                        bubbleTimeout = setTimeout(hideSpeechBubble, 3000);
                    };

                    // Use canplaythrough for reliable Edge WebView2 playback
                    audioPlayer.oncanplaythrough = () => {
                        audioPlayer.oncanplaythrough = null;
                        audioPlayer.play().catch(e => {
                            console.warn("Autoplay blocked:", e);
                            // Show a click-to-play prompt as fallback
                            showStatus('Click to hear Kiana', 0);
                            const onClick = () => {
                                audioPlayer.play().catch(console.warn);
                                hideStatus();
                                document.removeEventListener('click', onClick);
                            };
                            document.addEventListener('click', onClick);
                        });
                    };
                } else {
                    isSpeaking = false;
                    bubbleTimeout = setTimeout(hideSpeechBubble, 4000);
                }
            })
            .catch(err => {
                console.error("TTS failed:", err);
                hideStatus();
                isSpeaking = false;
                bubbleTimeout = setTimeout(hideSpeechBubble, 3000);
            });
        }

        // Send Text Message
        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            chatInput.value = "";
            hideSpeechBubble();
            showStatus("Thinking...", 0);

            fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                hideStatus();
                applyExpression(data.emotion);
                if (isAutoTTS) {
                    speakText(data.response);
                } else {
                    showSpeechBubble(data.response);
                    bubbleTimeout = setTimeout(hideSpeechBubble, 6000);
                }
            })
            .catch(err => {
                console.error("Chat error:", err);
                showStatus("Error occurred", 3000);
            });
        }

        // Microphone Speech-to-Text Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = "en-US";

            recognition.onstart = () => {
                isRecording = true;
                voiceBtn.classList.add("recording");
                showStatus("Listening...", 0);
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript;
                sendMessage(); // auto send transcribed text!
            };

            recognition.onerror = (e) => {
                console.error("Speech recognition error:", e);
                showStatus("Speech error", 3000);
            };

            recognition.onend = () => {
                isRecording = false;
                voiceBtn.classList.remove("recording");
                hideStatus();
            };
        }

        function toggleRecording() {
            if (recognition) {
                if (isRecording) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            } else {
                // MediaRecorder Fallback
                if (isRecording) {
                    stopMediaRecording();
                } else {
                    startMediaRecording();
                }
            }
        }

        function startMediaRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    isRecording = true;
                    voiceBtn.classList.add("recording");
                    showStatus("Recording...", 0);
                    
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        uploadAudio(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                })
                .catch(err => {
                    console.error("Mic error:", err);
                    showStatus("Mic access denied", 3000);
                });
        }

        function stopMediaRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            isRecording = false;
            voiceBtn.classList.remove("recording");
            hideStatus();
        }

        function uploadAudio(blob) {
            const formData = new FormData();
            formData.append("audio", blob, "audio.wav");
            showStatus("Transcribing...", 0);

            fetch("/api/voice-stt", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                hideStatus();
                if (data.text) {
                    chatInput.value = data.text;
                    sendMessage(); // Auto send
                }
            })
            .catch(err => {
                console.error("STT upload error:", err);
                showStatus("STT error", 3000);
            });
        }

        // Listeners
        sendBtn.addEventListener("click", sendMessage);
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        voiceBtn.addEventListener("click", toggleRecording);

        // ── Python/Wake-Word bridge functions ──────────────────────────────
        // Called by mascot.py when a wake-word response arrives
        window.receiveKianaMessage = function(text, emotion) {
            applyExpression(emotion || 'Relaxed');
            if (isAutoTTS) {
                speakText(text);
            } else {
                showSpeechBubble(text);
                clearTimeout(bubbleTimeout);
                bubbleTimeout = setTimeout(hideSpeechBubble, 6000);
            }
        };

        // Play an audio file by URL (called by Python after TTS is ready)
        window.playAudioUrl = function(url) {
            audioPlayer.src = url;
            audioPlayer.play().catch(e => console.warn('playAudioUrl failed:', e));
            isSpeaking = true;
            audioPlayer.onended = () => { isSpeaking = false; };
        };

        // Flash a brief "wake!" indicator on the speech bubble
        window.showWakeIndicator = function() {
            showSpeechBubble('✨ I\'m listening...');
            clearTimeout(bubbleTimeout);
            bubbleTimeout = setTimeout(hideSpeechBubble, 2500);
            applyExpression('Curious');
        };

        init();
    </script>
</body>
</html>
